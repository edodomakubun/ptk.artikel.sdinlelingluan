<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artikel Posting - SD Inpres Lelingluan</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f3f4f6; }
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; z-index: 10; }
        .fade-out { opacity: 0; pointer-events: none; transition: opacity 0.8s ease-in-out; }
    </style>
</head>
<body>

    <div id="loader" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-gray-100 transition-opacity duration-700">
        <div class="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mb-4"></div>
        <p class="text-gray-600 font-medium">Memuat Sistem...</p>
    </div>

    <iframe 
        id="appFrame"
        src="https://script.google.com/macros/s/AKfycbxxi6Rm1nqAAqZ0VGh8WVtP9fuxF0FkvUgkc0LtxMJzeTdrIcsTPlAKoNAspxCu7LjMcg/exec"
        onload="hideLoader()">
    </iframe>

    <script>
        function hideLoader() {
            const loader = document.getElementById('loader');
            loader.classList.add('fade-out');
            setTimeout(() => { loader.style.display = 'none'; }, 800);
        }
    </script>
</body>
</html>
